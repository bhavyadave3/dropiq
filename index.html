<!DOCTYPE html>
<html>
<head>
    <title>Dropiq</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1 class="logo"><span>D</span>ropiq</h1>
    <p class="tagline">Fast. Private. Effortless sharing.</p>

{% if current_user.is_authenticated %}
        <p>
            Welcome {{ user.username }} |
            <a href="/dashboard">Dashboard</a> |
            <a href="/logout">Logout</a>
        </p>
    {% else %}
        <p>
            <a href="/login">Login</a> |
            <a href="/register">Register</a>
        </p>
    {% endif %}

    <!-- DROP AREA -->
    <div id="dropArea" class="drop-area">
        <p id="fileText">
            Drag & Drop file here or <span class="browse">Browse</span>
        </p>
        <input type="file" id="fileInput" hidden>
    </div>

    <button onclick="uploadFile()">Upload File</button>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <hr>

    <!-- TEXT SHARE -->
    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    <button onclick="shareText()">Share Text</button>

    <div id="status"></div>

</div>

<div id="toast" class="toast"></div>

<script>

// ===== TOAST =====
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 2000);
}

// ===== FILE NAME =====
document.getElementById("fileInput").addEventListener("change", function(){
    let name = this.files[0] ? this.files[0].name : "No file selected";
    document.getElementById("fileText").innerText = name;
});

// ===== UPLOAD FILE =====
function uploadFile(){
    let file = document.getElementById("fileInput").files[0];

    if(!file){
        showToast("Select a file!");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);
    formData.append("csrf", "{{ csrf }}");

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "/", true);

    xhr.upload.onprogress = function(e){
        if(e.lengthComputable){
            let percent = (e.loaded / e.total) * 100;
            document.getElementById("progressBar").style.width = percent + "%";
        }
    };

    xhr.onload = function(){
        document.getElementById("status").innerHTML = xhr.responseText;
    };

    xhr.send(formData);
}

// ===== SHARE TEXT =====
function shareText(){
    let text = document.getElementById("textInput").value;

    if(!text.trim()){
        showToast("Enter text!");
        return;
    }

    let formData = new FormData();
    formData.append("text", text);
    formData.append("csrf", "{{ csrf }}");

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "/share_text", true);

    xhr.onload = function(){
        document.getElementById("status").innerHTML = xhr.responseText;
    };

    xhr.send(formData);
}

// ===== COPY =====
function copyLink(){
    let t = document.getElementById("linkBox").value;

    navigator.clipboard.writeText(t)
    .then(()=>showToast("Copied!"))
    .catch(()=>showToast("Failed"));
}

// ===== DRAG DROP =====
let dropArea = document.getElementById("dropArea");
let fileInput = document.getElementById("fileInput");

dropArea.onclick = () => fileInput.click();

dropArea.ondragover = (e)=>{
    e.preventDefault();
    dropArea.classList.add("active");
};

dropArea.ondragleave = ()=>{
    dropArea.classList.remove("active");
};

dropArea.ondrop = (e)=>{
    e.preventDefault();
    dropArea.classList.remove("active");

    fileInput.files = e.dataTransfer.files;
    document.getElementById("fileText").innerText = fileInput.files[0].name;
};

</script>

</body>
</html>
